// 简易模式（全部无 detail 且无 API）
function buildSimpleCards() {
  const wrap = document.createElement('div');
  wrap.id = 'result-cards-simple';
  selectedCards.forEach(({ card }) => {
    const div = document.createElement('div');
    div.className = 'result-card-simple';
    div.innerHTML = `
      <img src="photo/${card.filename}" alt="${card.name}">
      <div class="card-name">${card.name}</div>
      <div class="card-meaning">${card.meaning}</div>
    `;
    wrap.appendChild(div);
  });
  return wrap;
}

// 动态插入按钮到 result 容器末尾
function insertButtons() {
  // 清除旧按钮
  const old = document.querySelector('#result-details > .result-actions');
  if (old) old.remove();

  const actions = document.createElement('div');
  actions.className = 'result-actions';
  actions.innerHTML = `
    <button id="share-btn">📥 生成分享图</button>
    <button id="reshuffle-btn">✦ 重新占卜 ✦</button>
  `;
  resultDetails.appendChild(actions);
}

async function showResult() {
  playComplete();
  resultDetails.innerHTML = '';
  aiLoading.classList.remove('show');
  resultSource.textContent = '';

  resultQuestion.innerHTML = userQuestion
    ? `你问的是：<span>${userQuestion}</span>`
    : '';

  const hasApi = !!(apiEndpoint && apiKey);
  const hasAnyDetail = selectedCards.some(({ card }) => card.detail);

  // === 路径 1：API 可用 → 调用 AI ===
  if (hasApi) {
    aiLoading.classList.add('show');
    resultOverlay.classList.add('show');
    resultOverlay.scrollTop = 0;

    try {
      const response = await callAI(selectedCards.map(sc => sc.card), userQuestion);
      aiLoading.classList.remove('show');

      if (response && response.cards && response.cards.length > 0) {
        // API 成功
        resultSource.textContent = '✨ AI 智能解读';
        resultSource.style.color = '#6fcf97';
        response.cards.forEach((apiCard, i) => {
          const orig = selectedCards[i];
          const detail = apiCard.detail || null;
          const card = orig ? orig.card : apiCard;
          resultDetails.appendChild(buildDetailCard(card, detail, 'AI'));
        });
        showSummary(response.summary || null);
        insertButtons();
        return;
      }
    } catch(e) {
      console.warn('API 调用失败，降级到静态解析:', e.message);
      aiLoading.classList.remove('show');
    }
  }

  // === 路径 2：降级 → 静态解析 ===
  if (hasApi) {
    resultSource.textContent = '⚠ AI 解析暂不可用，展示经典释义';
    resultSource.style.color = '#c9a96e';
  }

  if (hasAnyDetail) {
    selectedCards.forEach(({ card }) => {
      resultDetails.appendChild(buildDetailCard(card, card.detail || null));
    });
  } else {
    resultDetails.appendChild(buildSimpleCards());
  }

  showSummary(null);
  insertButtons();
  resultOverlay.classList.add('show');
  resultOverlay.scrollTop = 0;
}

// ==================== API 调用 ====================
async function callAI(cards, question) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 20000);

  const aspects3 = ['感情', '事业', '心态'];
  const aspects5 = ['感情', '事业', '健康', '人际关系', '自我成长'];
  const aspects = cards.length === 5 ? aspects5 : aspects3;

  const requestBody = {
    model: 'gpt-4o',
    messages: [
      {
        role: 'system',
        content: `你是一位资深塔罗牌解读师，口语化风格，语气像朋友聊天一样温暖自然。请根据用户的问题和抽到的塔罗牌，为每张牌生成4个模块的解析，并生成一个综合分析总结。

返回格式必须为严格JSON：
{
  "cards": [
    {
      "name": "牌名",
      "detail": {
        "imagery": "牌面意象：用大白话描述画面里有什么、给人什么感觉，2-3句话。",
        "upright": "正位含义：结合用户问题给出个性化解读和行动建议，2-3句话。",
        "reversed": "逆位含义：警示提醒和转化建议，2-3句话。",
        "attributes": "数字/元素/星象：说明数字含义、元素属性、关联星座或行星，2-3句话。"
      }
    }
  ],
  "summary": {
    "overview": "总体解读：把这${cards.length}张牌串起来说一个完整的故事，2-4句话，口语化、有温度，像朋友帮你分析问题。",
    "advice": [
      {"aspect": "${aspects[0]}", "content": "从${aspects[0]}角度给出的具体建议，1-2句口语。"},
      {"aspect": "${aspects[1]}", "content": "从${aspects[1]}角度给出的具体建议，1-2句口语。"},
      {"aspect": "${aspects[2]}", "content": "从${aspects[2]}角度给出的具体建议，1-2句口语。"}${cards.length === 5 ? `,
      {"aspect": "${aspects[3]}", "content": "从${aspects[3]}角度给出的具体建议，1-2句口语。"},
      {"aspect": "${aspects[4]}", "content": "从${aspects[4]}角度给出的具体建议，1-2句口语。"}` : ''}
    ]
  }
}`
      },
      {
        role: 'user',
        content: `用户的问题：${question}\n\n抽到的牌（共${cards.length}张）：${cards.map(c => c.name + (c.nameEn ? `（${c.nameEn}）` : '') + (c.tag ? ` [${c.tag}]` : '')).join('、')}\n\n请为每张牌生成完整解析和综合分析。`
      }
    ],
    temperature: 0.8,
    max_tokens: 4096
  };

  let response;
  try {
    response = await fetch(apiEndpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify(requestBody),
      signal: controller.signal
    });
  } finally {
    clearTimeout(timeoutId);
  }

  if (!response.ok) {
    throw new Error(`API 返回状态 ${response.status}`);
  }

  const data = await response.json();
  const content = data.choices?.[0]?.message?.content;

  if (!content) {
    throw new Error('API 响应格式异常');
  }

  // 尝试提取 JSON
  const jsonMatch = content.match(/\{[\s\S]*"cards"[\s\S]*\}/);
  if (jsonMatch) {
    return JSON.parse(jsonMatch[0]);
  }

  // 如果整个 content 就是 JSON
  if (content.trim().startsWith('{')) {
    return JSON.parse(content);
  }

  throw new Error('无法解析 API 返回的 JSON');
}

function generateShareImage() {
  const W = 800, pad = 40, innerW = W - pad * 2;
  const canvas = document.createElement('canvas');
  canvas.width = W;

  // 计算高度
  let cardTexts = [];
  selectedCards.forEach(({ card }) => {
    cardTexts.push({ name: card.name, meaning: card.meaning });
  });
  const linesPer = cardTexts.map(c => {
    const n = Math.ceil(ctx_measure(c.meaning, innerW - 20, '16px Georgia'));
    return n;
  });
  const cardH = cardTexts.map((c, i) => 60 + linesPer[i] * 26 + 30);
  const totalCardH = cardH.reduce((a, b) => a + b, 0);
  const H = 120 + 40 + 50 + 40 + (userQuestion ? 80 : 0) + totalCardH + 80 + 60;
  canvas.height = H;

  const ctx = canvas.getContext('2d');

  function ctx_measure(text, maxW, font) {
    ctx.font = font;
    const words = text.split('');
    let lines = 1, line = '';
    for (let i = 0; i < words.length; i++) {
      const test = line + words[i];
      if (ctx.measureText(test).width > maxW && line.length > 0) {
        lines++;
        line = words[i];
      } else { line = test; }
    }
    return lines;
  }

  // 背景
  ctx.fillStyle = '#1a0a2e';
  ctx.fillRect(0, 0, W, H);

  // 装饰边框
  ctx.strokeStyle = '#c9a96e';
  ctx.lineWidth = 2;
  ctx.strokeRect(pad, pad, W - pad * 2, H - pad * 2);
  ctx.strokeStyle = 'rgba(201,169,110,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(pad + 8, pad + 8, W - pad * 2 - 16, H - pad * 2 - 16);

  // 顶部装饰星
  function drawStar(cx, cy, r) {
    ctx.fillStyle = '#c9a96e';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill();
  }
  drawStar(W / 2, 80, 14);

  // 标题
  ctx.fillStyle = '#c9a96e';
  ctx.font = 'bold 28px Georgia, SimSun, serif';
  ctx.textAlign = 'center';
  ctx.fillText('✦ 神秘塔罗 · 命运启示 ✦', W / 2, 130);

  // 分隔线
  ctx.strokeStyle = 'rgba(201,169,110,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad + 30, 155);
  ctx.lineTo(W - pad - 30, 155);
  ctx.stroke();

  let y = 185;

  // 牌阵
  if (spreadType) {
    ctx.fillStyle = '#8a7a8a';
    ctx.font = '14px Georgia, SimSun, serif';
    ctx.textAlign = 'center';
    ctx.fillText('牌阵：' + spreadType + ' · ' + selectedCards.length + '张', W / 2, y);
    y += 35;
  }

  // 用户问题
  if (userQuestion) {
    ctx.fillStyle = '#c9b896';
    ctx.font = 'bold 16px Georgia, SimSun, serif';
    ctx.textAlign = 'center';
    const q = userQuestion.length > 36 ? userQuestion.slice(0, 36) + '…' : userQuestion;
    ctx.fillText('问：' + q, W / 2, y);
    y += 45;
  }

  // 分隔线
  ctx.beginPath();
  ctx.moveTo(pad + 60, y - 10);
  ctx.lineTo(W - pad - 60, y - 10);
  ctx.stroke();
  y += 20;

  // 每张牌
  ctx.textAlign = 'left';
  cardTexts.forEach((c, i) => {
    // 牌名
    ctx.fillStyle = '#c9a96e';
    ctx.font = 'bold 20px Georgia, SimSun, serif';
    ctx.fillText('🂠 ' + c.name, pad + 30, y);
    y += 38;

    // 含义换行
    ctx.fillStyle = '#c9c0b5';
    ctx.font = '16px Georgia, SimSun, serif';
    const words = c.meaning.split('');
    let line = '';
    const lh = 26;
    for (let j = 0; j < words.length; j++) {
      const test = line + words[j];
      if (ctx.measureText(test).width > innerW - 20 && line.length > 0) {
        ctx.fillText(line, pad + 30, y);
        y += lh;
        line = words[j];
      } else { line = test; }
    }
    if (line) { ctx.fillText(line, pad + 30, y); y += lh; }
    y += 16;

    // 卡片间分隔
    if (i < cardTexts.length - 1) {
      ctx.strokeStyle = 'rgba(201,169,110,0.15)';
      ctx.beginPath();
      ctx.moveTo(pad + 30, y);
      ctx.lineTo(W - pad - 30, y);
      ctx.stroke();
      y += 16;
    }
  });

  // 底部
  y = Math.max(y + 20, H - 70);
  ctx.fillStyle = '#8a7a8a';
  ctx.font = '12px Georgia, SimSun, serif';
  ctx.textAlign = 'center';
  ctx.fillText('— 神秘塔罗 · 命运之牌 —', W / 2, y);
  y += 26;
  ctx.fillText(new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' }), W / 2, y);

  // 底角装饰星
  drawStar(pad + 40, H - pad - 30, 6);
  drawStar(W - pad - 40, H - pad - 30, 6);

  // 下载
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '塔罗占卜_' + new Date().toISOString().slice(0, 10) + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}
